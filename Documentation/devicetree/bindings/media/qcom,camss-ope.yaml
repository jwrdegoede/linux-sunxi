%YAML 1.2
---
$id: http://devicetree.org/schemas/media/qcom,camss-ope.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Qualcomm Camera Subsystem Offline Processing Engine

maintainers:
  - Loic Poulain <loic.poulain@oss.qualcomm.com>

description:
  The Qualcomm Camera Subsystem (CAMSS) Offline Processing Engine (OPE)
  is a memory-to-memory image processing block used. It supports a
  range of pixel-processing operations such as scaling, cropping, gain
  adjustments, white-balancing, and various format conversions. The OPE
  does not interface directly with image sensors, instead, it processes
  frames sourced from and written back to system memory.

properties:
  compatible:
    const: qcom,qcm2290-camss-ope

  reg:
    maxItems: 5

  reg-names:
    items:
      - const: top
      - const: bus_read
      - const: bus_write
      - const: pipeline
      - const: qos

  clocks:
    maxItems: 5

  clock-names:
    items:
      - const: axi
      - const: core
      - const: iface
      - const: nrt
      - const: top

  interrupts:
    maxItems: 1

  interconnects:
    maxItems: 2

  interconnect-names:
    items:
      - const: config
      - const: data

  iommus:
    maxItems: 2

  operating-points-v2: true

  opp-table:
    type: object

  power-domains:
    maxItems: 2

  power-domain-names:
    items:
      - const: camss
      - const: cx

required:
  - compatible
  - reg
  - reg-names
  - clocks
  - clock-names
  - interrupts
  - interconnects
  - interconnect-names
  - iommus
  - power-domains
  - power-domain-names

additionalProperties: true
